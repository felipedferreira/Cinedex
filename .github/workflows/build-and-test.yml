name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
    - uses: actions/checkout@v4

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          backend:
            - 'backend/**'
            - '.github/workflows/build-and-test.yml'
          frontend:
            - 'frontend/cinadex-ui/**'
            - '.github/workflows/build-and-test.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: backend/global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: dotnet test --no-build --verbosity normal --configuration Release
      continue-on-error: false

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/cinadex-ui

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/cinadex-ui/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Check formatting
      run: npm run format:check

    - name: Build
      run: npm run build

    - name: Run tests
      run: npm run test:run

  # Single check to require in branch protection. Passes when the relevant
  # jobs succeed or are skipped (path not touched), and fails if any failed
  # or was cancelled.
  ci-success:
    if: always()
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Verify backend and frontend jobs did not fail
      run: |
        if echo "${{ needs.backend.result }} ${{ needs.frontend.result }}" | grep -qE 'failure|cancelled'; then
          echo "A required job failed or was cancelled."
          exit 1
        fi
        echo "All required jobs passed or were skipped."
